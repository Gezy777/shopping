syntax = "proto3";

package frontend.eino;

import "api.proto";
import "frontend/common.proto";

option go_package = "frontend/eino";

message EinoReq {
    string ask = 1 [(api.form)="ask"];
  }

service EinoService {
  rpc Eino(EinoReq) returns (common.Empty) {
    option (api.post) = "/eino";
  }
}
